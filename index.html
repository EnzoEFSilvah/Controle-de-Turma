<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão da Turma - Tarefas e Comportamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar para as listas não quebrarem o layout */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-slate-100">

            <div>
                <h1 class="text-2xl font-bold text-slate-800">Painel de Controle da Turma</h1>
                <p class="text-slate-500 text-sm">Acompanhamento diário de Tarefas e gamificação </p>
            </div>

            <div class="mt-4 md:mt-0 flex items-center gap-3">
                <label for="datePicker" class="font-semibold text-slate-700">Data:</label>
                <input type="date" id="datePicker" class="border border-state-300 rouded-lg p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-indigo-600 text-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                <span class="text-lg font-medium">
                    Tarefas Feitas(Geral)
                </span>
                <span class="text-3xl font-bold">0</span>
            </div>

            <div class="bg-rose-600 text-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                <span class=" text-lg font-medium">Faltas Totais (Geral)</span>
                <span id="totalClassAbsences" class="text-3xl font-bold">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col h-[500px]">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>📚</span> Tarefas de Casa
                </h2>

                <div class="overflow-y-auto custom-scroll flex-1 pr-2" id="homeworkList"></div>
            </div>
        </div>

        <div class="space-y-6 flex flex-col h-[500px]">
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex-1 flex flex-col">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span>⭐</span> Comportamento (XP)
                </h2>

                <div class="overflow-y-auto custom-scroll flex-1 pr-2 space-y-3" id="behaviorList">
                </div>

            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 h-1/3 flex flex-col">
                <h2 class="text-lg font-bold mb-2 text-rose-700 flex items-center gap-2">
                    <span>⚠️</span>Chamar Pais
                </h2>

                <textarea id="observations" class="w-full flex-1 border border-slate-300 rounded-lg p-3 resize-none focus:ring-2 focus:ring-rose-500 outline-none text-sm" placeholder="Anote aqui os nomes dos alunos e o motivo..."></textarea>
            </div>

        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
